version: '3.8'

services:
  cv-review-bot:
    build: .
    container_name: cv-review-bot
    restart: unless-stopped
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Volume mappings for persistent data
    volumes:
      # Data directory persistence (includes database)
      - ./data:/app/data
      
      # Logs persistence
      - ./logs:/app/logs
      
      # Temporary files and PID management
      - ./tmp:/tmp
    
    # Network configuration
    networks:
      - bot-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Health check - verify bot process is running
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /tmp/cv_review_bot.pid && kill -0 $(cat /tmp/cv_review_bot.pid) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  bot-network:
    driver: bridge